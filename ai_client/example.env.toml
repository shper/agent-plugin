# ai_client 配置模板 —— 首次运行时由 config.py 自动复制到 ~/.agent-plugin/env.toml
# （无需手动 cp；复制后会在 stderr 提醒你填 base_url 与 api_key）。
# 实际配置 ~/.agent-plugin/env.toml 在插件目录外、含密钥，勿提交。
#
# 每个 [providers.<id>] 定义一个外部模型来源。<id> 由 to-consult/调用方按需引用。
# type 决定 transport：
#   claude-cli     —— 走 `claude -p --permission-mode plan`，print 只读，复用 Claude Code 登录态，无需 key
#   codex-cli      —— 走 `codex exec`，只读沙箱，复用 ChatGPT 登录态，无需 key/base_url
#   cursor-cli     —— 走 `cursor-agent -p --mode ask`，只读问答，复用 Cursor 登录态，无需 key
#                     一个 CLI 背后可选多模型（gpt-5 / sonnet-4 / sonnet-4-thinking，`cursor-agent --list-models` 查）
#   openai-compat  —— 走 OpenAI 兼容 /v1/chat/completions（httpx），需 base_url + api_key + model

# ── CLI transport（零 key，复用各自登录态，开箱即用）───────
# 三个 AI 工具底座各一个 provider；model 都可缺省 → 用该工具的「主模型」。
# [providers.claude]
# type  = "claude-cli"
# model = "opus"               # 可选；缺省用 claude 默认模型

# [providers.codex]
# type  = "codex-cli"
# model = "gpt-5.5-codex"      # 可选；缺省用 codex 默认主模型

# [providers.cursor]
# type  = "cursor-cli"
# model = "gpt-5.5-medium"     # 可选；缺省用 cursor 默认主模型（`cursor-agent --list-models` 查）

# ── OpenAI 兼容 API transport（需填 key，可选补充声音）──────
# [providers.deepseek]
# type     = "openai-compat"
# base_url = "https://api.deepseek.com/v1"
# api_key  = ""                     # ← 填真实 key
# model    = "deepseek-v4-pro"

# [providers.openai]
# type     = "openai-compat"
# base_url = "https://api.openai.com/v1"
# api_key  = ""                     # ← 填真实 key
# model    = "gpt-5.5"

# [providers.ollama]
# type     = "openai-compat"
# base_url = "http://localhost:11434/v1"
# model    = "qwen3.7"              # 本地，无需 key（先 `ollama pull qwen3.7`）

# ── to-consult 外部声音池 ─────
# 主裁 = 当前宿主主模型（运行时主会话自知，无需配置）。
# persona 批 = 宿主底座（Claude Code 走 Workflow；Codex/Cursor 主会话自扮演）。
# 外部声音池：按「当前宿主」取数组当跨底座盲区声音，天然排除同底座（同底座无互补价值）。
# 主会话探测自己是哪个宿主 → 取对应键的数组 → 逐个并发调 cli.py。
# [to-consult.external_voices]
# claude = ["codex", "cursor"]      # 宿主 = Claude Code  →  外部用 codex + cursor
# codex  = ["claude", "cursor"]     # 宿主 = Codex        →  外部用 claude + cursor
# cursor = ["claude", "codex"]      # 宿主 = Cursor       →  外部用 claude + codex
